<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Manager</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f1a;
            --panel: #1a1a2e;
            --panel-2: #121226;
            --border: #2a2a3e;
            --text: #e0e0e0;
            --muted: #8a8aa3;
            --accent: #00d4ff;
            --accent2: #7b2ff7;
            --good: #00e676;
            --danger: #ff5252;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top right, #1d1d34, var(--bg) 42%);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 16px;
            font-size: 0.92rem;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            transition: opacity 0.18s ease, transform 0.18s ease;
        }

        .btn:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #2f325a;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff5252, #ff1744);
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            margin-bottom: 14px;
        }

        .todo-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .todo-input-row input {
            flex: 1;
            border: 1px solid #35406b;
            background: rgba(10, 13, 28, 0.95);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.95rem;
        }

        .todo-input-row input[type="date"] {
            flex: 0 0 170px;
            color-scheme: dark;
        }

        .todo-input-row input::placeholder {
            color: #8992b4;
        }

        .todo-input-row select {
            flex: 1;
            border: 1px solid #35406b;
            background: rgba(10, 13, 28, 0.95);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.95rem;
            min-height: 42px;
        }

        .source-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .source-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #edf2ff;
            margin-bottom: 4px;
        }

        .source-note {
            color: var(--muted);
            font-size: 0.86rem;
            line-height: 1.45;
        }

        .source-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .source-actions .btn[hidden] {
            display: none;
        }

        .todo-readonly-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            border: 1px solid #35559d;
            background: rgba(53, 85, 157, 0.18);
            color: #cfe0ff;
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .todo-item.readonly {
            opacity: 0.98;
        }

        .todo-item.readonly .todo-title {
            color: #eef3ff;
        }

        .todo-item.readonly .todo-meta {
            color: #b8c6e7;
        }

        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 66vh;
            overflow-y: auto;
            padding-right: 2px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(13, 17, 36, 0.9);
            border: 1px solid #2f3a60;
            border-radius: 12px;
            padding: 10px 12px;
        }

        .todo-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }

        .todo-title {
            flex: 1;
            font-size: 0.92rem;
            word-break: break-word;
        }

        .todo-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .todo-meta {
            font-size: 0.76rem;
            color: #95a4c7;
        }

        .todo-title.done {
            color: var(--muted);
            text-decoration: line-through;
        }

        .todo-actions {
            display: flex;
            gap: 6px;
        }

        .mini-btn {
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 6px 10px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
        }

        .mini-btn.edit {
            background: #3559a8;
        }

        .mini-btn.delete {
            background: var(--danger);
        }

        .todo-empty {
            font-size: 0.88rem;
            color: var(--muted);
            border: 1px dashed #34406a;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            background: rgba(11, 15, 32, 0.65);
        }

        .stats {
            display: flex;
            gap: 14px;
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .menu-toggle {
            position: fixed;
            top: 14px;
            left: 14px;
            width: 46px;
            height: 46px;
            border: 1px solid #2f3f67;
            border-radius: 12px;
            background: linear-gradient(135deg, #11162c, #1b2440);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            z-index: 1200;
            box-shadow: 0 10px 24px rgba(2, 7, 22, 0.55);
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .menu-toggle:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
        }

        .menu-toggle span {
            width: 22px;
            height: 2px;
            border-radius: 999px;
            background: #d9e8ff;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        body.menu-open .menu-toggle span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        body.menu-open .menu-toggle span:nth-child(2) {
            opacity: 0;
        }

        body.menu-open .menu-toggle span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        .menu-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(7, 10, 20, 0.58);
            backdrop-filter: blur(2px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 1100;
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: min(340px, 88vw);
            padding: 74px 18px 18px;
            background: linear-gradient(180deg, #161e37, #0f1325 70%);
            border-right: 1px solid #2f3c63;
            box-shadow: 16px 0 36px rgba(0, 0, 0, 0.35);
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            z-index: 1150;
            overflow-y: auto;
        }

        body.menu-open .side-menu {
            transform: translateX(0);
        }

        body.menu-open .menu-backdrop {
            opacity: 1;
            pointer-events: auto;
        }

        .side-menu-title {
            font-size: 1rem;
            letter-spacing: 0.35px;
            color: #dfe8ff;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .feature-btn {
            width: 100%;
            text-align: left;
            border: 1px solid #334877;
            background: #171f39;
            color: #e4ecff;
            border-radius: 10px;
            padding: 12px 12px;
            font-size: 0.92rem;
            font-weight: 600;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        }

        .feature-btn:hover {
            transform: translateX(2px);
            border-color: #4f6bb0;
            background: #1d2850;
        }

        .feature-btn.is-active {
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 10px 20px rgba(0, 180, 255, 0.28);
        }

        @media (max-width: 720px) {
            body { padding: 14px; }
            .header { flex-direction: column; align-items: flex-start; }
            .todo-input-row { flex-direction: column; }
            .source-row { align-items: flex-start; }
            .source-actions { width: 100%; }
            .source-actions .btn { width: 100%; }
        }
    </style>
    <link rel="stylesheet" href="interactive-bg.css">
</head>
<body>
    <button id="menuToggle" class="menu-toggle" aria-label="Open features menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div id="menuBackdrop" class="menu-backdrop"></div>

    <aside id="sideMenu" class="side-menu" aria-hidden="true">
        <div class="side-menu-title">Features</div>
        <button id="menuTrackerBtn" class="feature-btn">Focus Timer</button>
        <button id="menuHistoryBtn" class="feature-btn">Session History</button>
        <button id="menuTodoBtn" class="feature-btn">To-Do Manager</button>
        <button id="menuCalendarBtn" class="feature-btn">Calendar</button>
        <button id="menuSummarizerBtn" class="feature-btn">AI Summarizer</button>
    </aside>

    <div class="container">
        <div class="header">
            <h1>To-Do Manager</h1>
        </div>
        <div class="subtitle">Add, edit, complete, or delete tasks here. The tracker page shows this list in read-only mode.</div>

        <div class="card">
            <div class="source-row">
                <div>
                    <div class="source-title">Task source</div>
                    <div id="sourceStatus" class="source-note">Local Supabase tasks are active.</div>
                </div>
                <div class="source-actions">
                    <button id="useLocalTodoBtn" class="btn btn-secondary" type="button">Local Tasks</button>
                    <button id="loadMicrosoftTodoBtn" class="btn" type="button">Load Microsoft To Do</button>
                    <button id="microsoftLoginBtn" class="btn" type="button">Sign in Microsoft</button>
                    <button id="microsoftLogoutBtn" class="btn btn-secondary" type="button" hidden>Sign out</button>
                </div>
            </div>
            <div class="todo-input-row" style="margin-top: 12px;">
                <select id="microsoftTodoListSelect" aria-label="Microsoft To Do list" disabled></select>
            </div>
            <div id="microsoftModeNote" class="source-note" style="margin-top: 8px;">Sign in to Microsoft to load your own To Do lists and enable task sync.</div>
        </div>

        <div class="card">
            <div class="todo-input-row">
                <input id="todoInput" type="text" maxlength="160" placeholder="Add a task...">
                <input id="dueDateInput" type="date" aria-label="Due date">
                <button id="addTodoBtn" class="btn">Add Task</button>
            </div>
            <div class="stats">
                <div>Total: <strong id="totalCount">0</strong></div>
                <div>Open: <strong id="openCount">0</strong></div>
                <div>Done: <strong id="doneCount">0</strong></div>
            </div>
        </div>

        <div class="card">
            <div id="todoEmpty" class="todo-empty">No tasks yet.</div>
            <ul id="todoList" class="todo-list"></ul>
        </div>
    </div>

    <script src="interactive-bg.js" defer></script>
    <script>
        const todoInput = document.getElementById('todoInput');
        const dueDateInput = document.getElementById('dueDateInput');
        const addTodoBtn = document.getElementById('addTodoBtn');
        const todoListEl = document.getElementById('todoList');
        const todoEmptyEl = document.getElementById('todoEmpty');
        const totalCountEl = document.getElementById('totalCount');
        const openCountEl = document.getElementById('openCount');
        const doneCountEl = document.getElementById('doneCount');
        const menuToggle = document.getElementById('menuToggle');
        const sideMenu = document.getElementById('sideMenu');
        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            && window.location.port === '5500'
            ? 'http://127.0.0.1:5000'
            : '';

        function apiUrl(path) {
            return `${API_BASE}${path}`;
        }
        const menuBackdrop = document.getElementById('menuBackdrop');
        const menuTrackerBtn = document.getElementById('menuTrackerBtn');
        const menuHistoryBtn = document.getElementById('menuHistoryBtn');
        const menuTodoBtn = document.getElementById('menuTodoBtn');
        const menuCalendarBtn = document.getElementById('menuCalendarBtn');
        const menuSummarizerBtn = document.getElementById('menuSummarizerBtn');
        const sourceStatusEl = document.getElementById('sourceStatus');
        const useLocalTodoBtn = document.getElementById('useLocalTodoBtn');
        const loadMicrosoftTodoBtn = document.getElementById('loadMicrosoftTodoBtn');
        const microsoftLoginBtn = document.getElementById('microsoftLoginBtn');
        const microsoftLogoutBtn = document.getElementById('microsoftLogoutBtn');
        const microsoftModeNoteEl = document.getElementById('microsoftModeNote');
        const microsoftTodoListSelect = document.getElementById('microsoftTodoListSelect');

        let todos = [];
        let todoMode = 'local';
        let microsoftAuth = {
            authenticated: false,
            user: null,
        };
        let microsoftTodoState = {
            userPrincipalName: '',
            lists: [],
            selectedListId: '',
            readOnly: true,
        };

        async function apiFetch(path, options = {}) {
            const mergedOptions = {
                ...options,
                credentials: 'include'
            };
            return fetch(apiUrl(path), mergedOptions);
        }

        function setMenuOpen(isOpen) {
            document.body.classList.toggle('menu-open', isOpen);
            menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            sideMenu.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
        }

        function setActiveMenuButton() {
            const rawPath = window.location.pathname.toLowerCase();
            const file = rawPath.split('/').pop() || 'index.html';
            const activeIdByPath = {
                '': 'menuTrackerBtn',
                'index.html': 'menuTrackerBtn',
                'history': 'menuHistoryBtn',
                'history.html': 'menuHistoryBtn',
                'todo': 'menuTodoBtn',
                'todo.html': 'menuTodoBtn',
                'calendar': 'menuCalendarBtn',
                'calendar.html': 'menuCalendarBtn',
                'ai-summarizer': 'menuSummarizerBtn',
                'ai_summarizer.html': 'menuSummarizerBtn',
            };

            const activeId = activeIdByPath[file] || activeIdByPath[rawPath] || null;
            document.querySelectorAll('.side-menu .feature-btn').forEach((btn) => {
                btn.classList.remove('is-active');
            });

            if (!activeId) return;
            const activeBtn = document.getElementById(activeId);
            if (activeBtn) {
                activeBtn.classList.add('is-active');
            }
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function setSourceStatus(message) {
            sourceStatusEl.textContent = message;
        }

        function setMicrosoftModeNote(message) {
            microsoftModeNoteEl.textContent = message;
        }

        function updateAuthButtons() {
            microsoftLoginBtn.hidden = microsoftAuth.authenticated;
            microsoftLogoutBtn.hidden = !microsoftAuth.authenticated;
        }

        async function refreshMicrosoftAuthStatus() {
            try {
                const response = await apiFetch('/api/auth/microsoft/status');
                const data = await response.json();
                microsoftAuth = {
                    authenticated: Boolean(data?.authenticated),
                    user: data?.user || null,
                };
            } catch (_error) {
                microsoftAuth = { authenticated: false, user: null };
            }

            updateAuthButtons();
            return microsoftAuth;
        }

        function setTodoMode(nextMode) {
            todoMode = nextMode;
            const isMicrosoftMode = todoMode === 'microsoft';
            const microsoftWritable = isMicrosoftMode && !microsoftTodoState.readOnly;
            todoInput.disabled = isMicrosoftMode && !microsoftWritable;
            dueDateInput.disabled = isMicrosoftMode && !microsoftWritable;
            addTodoBtn.disabled = isMicrosoftMode && !microsoftWritable;
            microsoftTodoListSelect.disabled = !isMicrosoftMode || !microsoftTodoState.lists.length;
            if (isMicrosoftMode) {
                todoInput.placeholder = microsoftWritable
                    ? 'Add a Microsoft To Do task...'
                    : 'Microsoft To Do mode is read-only';
            } else {
                todoInput.placeholder = 'Add a task...';
            }

            useLocalTodoBtn.classList.toggle('btn-secondary', true);
            loadMicrosoftTodoBtn.disabled = false;

            if (isMicrosoftMode) {
                setSourceStatus(
                    microsoftTodoState.userPrincipalName
                        ? `Microsoft To Do is active for ${microsoftTodoState.userPrincipalName}.`
                        : 'Microsoft To Do is active.'
                );
                setMicrosoftModeNote(
                    microsoftTodoState.readOnly
                        ? 'Microsoft To Do is running in read-only mode. Sign in to enable create/edit/delete.'
                        : 'Signed in to Microsoft. Create, edit, complete, and delete now sync to Microsoft To Do.'
                );
            } else {
                setSourceStatus('Local Supabase tasks are active.');
                setMicrosoftModeNote('Sign in to Microsoft to load your own To Do lists and enable task sync.');
            }
        }

        function updateMicrosoftTodoListOptions() {
            microsoftTodoListSelect.innerHTML = '';

            if (!microsoftTodoState.lists.length) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = 'No Microsoft To Do lists found';
                microsoftTodoListSelect.appendChild(option);
                microsoftTodoListSelect.disabled = true;
                return;
            }

            for (const list of microsoftTodoState.lists) {
                const option = document.createElement('option');
                option.value = String(list.id || '');
                const label = list.displayName || 'Unnamed list';
                option.textContent = list.wellknownListName === 'defaultList' ? `${label} (default)` : label;
                microsoftTodoListSelect.appendChild(option);
            }

            if (!microsoftTodoState.selectedListId) {
                microsoftTodoState.selectedListId = String(microsoftTodoState.lists[0].id || '');
            }

            microsoftTodoListSelect.value = microsoftTodoState.selectedListId;
            microsoftTodoListSelect.disabled = todoMode !== 'microsoft';
        }

        function normalizeTodoId(todoId) {
            return String(todoId ?? '');
        }

        function updateCounts() {
            const total = todos.length;
            const done = todos.filter((todo) => todo.isDone).length;
            const open = total - done;
            totalCountEl.textContent = String(total);
            openCountEl.textContent = String(open);
            doneCountEl.textContent = String(done);
        }

        function renderTodos() {
            todoListEl.innerHTML = '';
            updateCounts();

            if (!todos.length) {
                todoEmptyEl.textContent = todoMode === 'microsoft'
                    ? 'No Microsoft To Do tasks found.'
                    : 'No tasks yet.';
                todoEmptyEl.style.display = 'block';
                return;
            }

            todoEmptyEl.style.display = 'none';
            for (const todo of todos) {
                const li = document.createElement('li');
                const isReadOnlyItem = todoMode === 'microsoft' && microsoftTodoState.readOnly;
                li.className = isReadOnlyItem ? 'todo-item readonly' : 'todo-item';
                const dueText = todo.dueDate ? `Due: ${escapeHtml(todo.dueDate)}` : 'No due date';
                const readOnlyLabel = todoMode === 'microsoft'
                    ? `<span class="todo-readonly-label">Microsoft To Do${microsoftTodoState.readOnly ? ' (read-only)' : ''}</span>`
                    : '';
                const actionsMarkup = todoMode === 'microsoft' && microsoftTodoState.readOnly
                    ? ''
                    : `
                    <div class="todo-actions">
                        <button class="mini-btn edit" data-id="${escapeHtml(todo.id)}">Edit</button>
                        <button class="mini-btn delete" data-id="${escapeHtml(todo.id)}">Delete</button>
                    </div>
                `;
                li.innerHTML = `
                    <input type="checkbox" data-id="${escapeHtml(todo.id)}" ${todo.isDone ? 'checked' : ''} ${isReadOnlyItem ? 'disabled' : ''}>
                    <div class="todo-main">
                        <span class="todo-title ${todo.isDone ? 'done' : ''}">${escapeHtml(todo.title)}</span>
                        <span class="todo-meta">${dueText}</span>
                    </div>
                    ${readOnlyLabel}
                    ${actionsMarkup}
                `;
                todoListEl.appendChild(li);
            }
        }

        async function loadLocalTodos() {
            setSourceStatus('Local Supabase tasks are active.');
            try {
                const response = await apiFetch('/api/todos');
                if (!response.ok) throw new Error('Failed to load todos');
                const data = await response.json();
                todos = data.todos || [];
                todoMode = 'local';
                microsoftTodoState = {
                    userPrincipalName: '',
                    lists: [],
                    selectedListId: '',
                    readOnly: true,
                };
                updateMicrosoftTodoListOptions();
                setTodoMode('local');
                renderTodos();
            } catch (error) {
                console.error(error);
                todoEmptyEl.textContent = 'Unable to load tasks right now';
                todoEmptyEl.style.display = 'block';
            }
        }

        async function loadMicrosoftTodos(listId = '') {
            const params = new URLSearchParams();
            if (listId) {
                params.set('listId', listId);
            }

            try {
                const response = await apiFetch(`/api/microsoft-todo/tasks${params.toString() ? `?${params.toString()}` : ''}`);
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data?.error || 'Failed to load Microsoft To Do tasks');
                }

                todos = data.todos || [];
                microsoftTodoState = {
                    userPrincipalName: data.userPrincipalName || microsoftAuth.user?.userPrincipalName || '',
                    lists: data.lists || [],
                    selectedListId: data.selectedList?.id ? String(data.selectedList.id) : (listId || ''),
                    readOnly: Boolean(data.readOnly),
                };
                setTodoMode('microsoft');
                updateMicrosoftTodoListOptions();
                renderTodos();
                const listName = data.selectedList?.displayName || 'Microsoft To Do';
                setSourceStatus(
                    `Showing ${listName} for ${microsoftTodoState.userPrincipalName || 'current Microsoft account'}.`
                );
            } catch (error) {
                console.error(error);
                setSourceStatus(error.message || 'Unable to load Microsoft To Do right now');
                todoEmptyEl.textContent = 'Unable to load Microsoft To Do tasks right now';
                todoEmptyEl.style.display = 'block';
            }
        }

        async function loadTodos() {
            if (microsoftAuth.authenticated) {
                todoMode = 'microsoft';
                await loadMicrosoftTodos(microsoftTodoState.selectedListId);
                return;
            }

            await loadLocalTodos();
        }

        async function addTodo() {
            const title = todoInput.value.trim();
            const dueDate = dueDateInput.value;
            if (!title) return;

            addTodoBtn.disabled = true;
            try {
                let response;
                if (todoMode === 'microsoft') {
                    response = await apiFetch('/api/microsoft-todo/tasks', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title,
                            dueDate: dueDate || null,
                            listId: microsoftTodoState.selectedListId || null,
                        })
                    });
                } else {
                    response = await apiFetch('/api/todos', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, dueDate: dueDate || null })
                    });
                }
                if (!response.ok) throw new Error('Failed to add todo');
                todoInput.value = '';
                dueDateInput.value = '';
                await loadTodos();
            } catch (error) {
                console.error(error);
            } finally {
                addTodoBtn.disabled = false;
            }
        }

        async function setTodoDone(todoId, isDone) {
            try {
                let response;
                if (todoMode === 'microsoft') {
                    const current = todos.find((todo) => normalizeTodoId(todo.id) === normalizeTodoId(todoId));
                    if (!current?.microsoftTodo?.listId) throw new Error('Missing Microsoft list context');
                    response = await apiFetch(`/api/microsoft-todo/tasks/${encodeURIComponent(todoId)}?listId=${encodeURIComponent(current.microsoftTodo.listId)}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ isDone, listId: current.microsoftTodo.listId, listName: current.microsoftTodo.listName })
                    });
                } else {
                    response = await apiFetch(`/api/todos/${todoId}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ isDone })
                    });
                }
                if (!response.ok) throw new Error('Failed to update todo');
                await loadTodos();
            } catch (error) {
                console.error(error);
            }
        }

        async function editTodoTitle(todoId) {
            const current = todos.find((todo) => normalizeTodoId(todo.id) === normalizeTodoId(todoId));
            if (!current) return;

            const nextTitle = window.prompt('Edit task', current.title);
            if (nextTitle === null) return;

            const title = nextTitle.trim();
            if (!title) {
                window.alert('Task title cannot be empty');
                return;
            }

            try {
                let response;
                if (todoMode === 'microsoft') {
                    if (!current?.microsoftTodo?.listId) throw new Error('Missing Microsoft list context');
                    response = await apiFetch(`/api/microsoft-todo/tasks/${encodeURIComponent(todoId)}?listId=${encodeURIComponent(current.microsoftTodo.listId)}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, listId: current.microsoftTodo.listId, listName: current.microsoftTodo.listName })
                    });
                } else {
                    response = await apiFetch(`/api/todos/${todoId}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title })
                    });
                }
                if (!response.ok) throw new Error('Failed to edit todo');
                await loadTodos();
            } catch (error) {
                console.error(error);
            }
        }

        async function removeTodo(todoId) {
            try {
                let response;
                if (todoMode === 'microsoft') {
                    const current = todos.find((todo) => normalizeTodoId(todo.id) === normalizeTodoId(todoId));
                    if (!current?.microsoftTodo?.listId) throw new Error('Missing Microsoft list context');
                    response = await apiFetch(`/api/microsoft-todo/tasks/${encodeURIComponent(todoId)}?listId=${encodeURIComponent(current.microsoftTodo.listId)}`, {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ listId: current.microsoftTodo.listId, listName: current.microsoftTodo.listName })
                    });
                } else {
                    response = await apiFetch(`/api/todos/${todoId}`, {
                        method: 'DELETE'
                    });
                }
                if (!response.ok) throw new Error('Failed to delete todo');
                await loadTodos();
            } catch (error) {
                console.error(error);
            }
        }

        menuToggle.addEventListener('click', () => {
            const isOpen = document.body.classList.contains('menu-open');
            setMenuOpen(!isOpen);
        });
        menuBackdrop.addEventListener('click', () => setMenuOpen(false));
        menuTrackerBtn.addEventListener('click', () => {
            setMenuOpen(false);
            window.location.href = 'index.html';
        });
        menuHistoryBtn.addEventListener('click', () => {
            setMenuOpen(false);
            window.location.href = 'history.html';
        });
        menuTodoBtn.addEventListener('click', () => {
            setMenuOpen(false);
            window.location.href = 'todo.html';
        });
        menuCalendarBtn.addEventListener('click', () => {
            setMenuOpen(false);
            window.location.href = 'calendar.html';
        });
        menuSummarizerBtn.addEventListener('click', () => {
            setMenuOpen(false);
            window.location.href = 'ai_summarizer.html';
        });
        useLocalTodoBtn.addEventListener('click', async () => {
            setTodoMode('local');
            await loadLocalTodos();
        });
        loadMicrosoftTodoBtn.addEventListener('click', async () => {
            await refreshMicrosoftAuthStatus();
            microsoftTodoState.selectedListId = microsoftTodoListSelect.value || microsoftTodoState.selectedListId || '';
            await loadMicrosoftTodos(microsoftTodoState.selectedListId);
        });
        microsoftLoginBtn.addEventListener('click', () => {
            const nextTarget = encodeURIComponent(window.location.href);
            window.location.href = apiUrl(`/api/auth/microsoft/login?next=${nextTarget}`);
        });
        microsoftLogoutBtn.addEventListener('click', async () => {
            try {
                await apiFetch('/api/auth/microsoft/logout', { method: 'POST' });
            } catch (_error) {
                // Ignore logout network errors and clear UI state anyway.
            }

            microsoftAuth = { authenticated: false, user: null };
            updateAuthButtons();
            microsoftTodoState.readOnly = true;
            setTodoMode('local');
            await loadLocalTodos();
        });
        microsoftTodoListSelect.addEventListener('change', async () => {
            if (todoMode !== 'microsoft') return;
            microsoftTodoState.selectedListId = microsoftTodoListSelect.value;
            await loadMicrosoftTodos(microsoftTodoState.selectedListId);
        });
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && document.body.classList.contains('menu-open')) {
                setMenuOpen(false);
            }
        });

        addTodoBtn.addEventListener('click', addTodo);
        todoInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') addTodo();
        });

        todoListEl.addEventListener('change', (event) => {
            const target = event.target;
            if (!(target instanceof HTMLInputElement)) return;
            if (target.type !== 'checkbox') return;
            if (todoMode === 'microsoft' && microsoftTodoState.readOnly) return;
            const todoId = target.dataset.id || '';
            if (!todoId) return;
            setTodoDone(todoId, target.checked);
        });

        todoListEl.addEventListener('click', (event) => {
            const target = event.target;
            if (!(target instanceof HTMLButtonElement)) return;
            if (todoMode === 'microsoft' && microsoftTodoState.readOnly) return;
            const todoId = target.dataset.id || '';
            if (!todoId) return;

            if (target.classList.contains('edit')) {
                editTodoTitle(todoId);
                return;
            }
            if (target.classList.contains('delete')) {
                removeTodo(todoId);
            }
        });

        async function initializeTodoPage() {
            setActiveMenuButton();
            await refreshMicrosoftAuthStatus();
            if (microsoftAuth.authenticated) {
                todoMode = 'microsoft';
                microsoftTodoState.readOnly = false;
                setTodoMode('microsoft');
                await loadMicrosoftTodos(microsoftTodoState.selectedListId);
                return;
            }

            await loadTodos();
        }

        initializeTodoPage();
    </script>
</body>
</html>
